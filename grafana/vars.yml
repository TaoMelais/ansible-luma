---
# ============================================================
# Variables Grafana
# ============================================================
grafana_version: "latest"
grafana_ip: "172.16.1.55"
grafana_port: 3000
grafana_admin_user: "admin"
grafana_admin_password: "admin"

# Variables d'environnement supplémentaires pour Grafana
grafana_env_vars:
  GF_AUTH_ANONYMOUS_ENABLED: "false"
  GF_USERS_ALLOW_SIGN_UP: "false"
  GF_USERS_DEFAULT_THEME: "dark"
  GF_SERVER_ROOT_URL: "http://{{ grafana_ip }}:{{ grafana_port }}"
  GF_DATABASE_TYPE: "sqlite3"
  GF_ANALYTICS_REPORTING_ENABLED: "false"
  GF_SECURITY_DISABLE_GRAVATAR: "true"

# ============================================================
# Datasources Grafana
# Décommenter / adapter selon vos besoins
# ============================================================
grafana_datasources:

  # --- Prometheus (scraping métriques) ---
  - name: "Prometheus"
    type: "prometheus"
    access: "proxy"
    url: "http://localhost:9090"
    is_default: true
    enabled: true
    json_data:
      httpMethod: "POST"
      timeInterval: "15s"

  # --- Loki (logs) ---
  - name: "Loki"
    type: "loki"
    access: "proxy"
    url: "http://localhost:3100"
    is_default: false
    enabled: false
    json_data:
      maxLines: 1000






